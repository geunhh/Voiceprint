version: '3.8'

services:
  # FE (from docker-compose.yml)
  frontend:
    container_name: frontend
    # image: jokiheum/voiceprint-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "81:80"
    env_file:
      - ./frontend/.env
    environment:
      - TZ=Asia/Seoul
    volumes:
      - /etc/localtime:/etc/localtime:ro
    networks: [voiceprint_net] # Changed network
    restart: unless-stopped

  # 1. Kafka (Zookeeper-less KRaft mode)
  kafka:
    image: bitnami/kafka:latest
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_BROKER_ID=1
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CLUSTER_ID="a9d5b1b2-b1b2-4b1b-8b1b-d5b1b2a9d5b1"
    networks:
      - voiceprint_net
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8082:8080"  # host:container
    environment:
      - KAFKA_CLUSTERS_0_NAME=voiceprint
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
      - KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL=PLAINTEXT
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - voiceprint_net
    restart: unless-stopped

  # 2. Discovery Service (Eureka)
  discovery-service:
    build: ./services/discovery-service
    ports:
      - "8762:8761"
    environment:
      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=false
      - EUREKA_CLIENT_FETCH_REGISTRY=false
      - SERVER_PORT=8761
    networks:
      - voiceprint_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s # Modified from 30s

  # 3. Config Service
  config-service:
    build: ./services/config-service
    ports:
      - "8889:8888"
    environment:
      - SPRING_PROFILES_ACTIVE=native
      - SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS=file:/config-repo
    volumes:
      - ./config-repo:/config-repo
    networks:
      - voiceprint_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s # Modified from 30s

  # 4. Gateway Service
  gateway-service:
    build: ./services/gateway-service
    ports:
      - "8001:8000"
    depends_on:
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
    environment:
      - SPRING_CONFIG_IMPORT=configserver:http://config-service:8888
    networks:
      - voiceprint_net

  # 5. Backend Service (MSA)
  backend-msa:
    build:
      context: .
      dockerfile: ./services/backend-msa/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./services/backend-msa/.env
    environment:
      MYSQL_HOST: mysql_vp
      MYSQL_PORT: 3306
      MYSQL_DATABASE: voiceprint_db
      MYSQL_USER: voiceprint_user
      MYSQL_PASSWORD: thisisneverthat
    networks:
      - voiceprint_net

  # 6. Notification Service
  notification-service:
    build:
      context: .
      dockerfile: ./services/notification-service/Dockerfile
    depends_on:
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - SPRING_CONFIG_IMPORT=configserver:http://config-service:8888
      - SPRING_JWT_SECRET=vmfhaltmskdlstkfkdgodyrolroqkfwkalskdjqwkjdnkasjlqsssa
    networks:
      - voiceprint_net

  # MySQL Service (from docker-compose.yml)
  mysql:
    container_name: mysql_vp
    build:
      context: ./mysql
      dockerfile: Dockerfile
    ports:
      - "3307:3306" #로컬에서 3306 이미 사용중.
    env_file:
      - ./mysql/.env
    volumes:
      - mysql-data:/var/lib/mysql
    networks: [voiceprint_net] # Changed network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping"] # mysql이 healthy 한 지 판단
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Redis Service (from docker-compose.yml)
  redis:
    container_name: redis
    image: redis:8
    ports:
      - "6379:6379"
    env_file:
      - ./redis/.env
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    command:
      - /bin/sh
      - -c
      - redis-server /usr/local/etc/redis/redis.conf --requirepass "$${REDIS_PASSWORD:?REDIS_PASSWORD variable is not set}"
    networks: [voiceprint_net] # Changed network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" ping"]
      interval: 5s
      retries: 10
    restart: unless-stopped
  
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - voiceprint_net

  grafana:
    image: grafana/grafana
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro

    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - voiceprint_net



volumes:
  mysql-data:
    name: mysql-data
  prom_data:
  grafana_data:

networks:
  voiceprint_net:
    driver: bridge
    # external : true