services:
  # FE (from docker-compose.yml)
  frontend:
    container_name: frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "81:80"
    env_file:
      - ./frontend/.env
    environment:
      - TZ=Asia/Seoul
    volumes:
      - /etc/localtime:/etc/localtime:ro
    networks: [voiceprint_net]
    restart: unless-stopped

  # 1. Kafka (KRaft mode)
  kafka:
    #image: bitnami/kafka:latest # 지원 종료.
    image: confluentinc/cp-kafka:7.7.5
    container_name: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      # === KRaft 모드 설정 ===
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: "1"
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # === 단일 브로커 설정 ===
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"

      # === 로깅 및 안정성 ===
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1

      # === (선택) 클러스터 ID 고정 ===
      CLUSTER_ID: FpsANus9RYqj6SpEpTSjSA
#      KAFKA_CLUSTER_ID: pXkmGirYT7yKp5sO5DJ5Dg
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - voiceprint_net
    healthcheck:
      # 토픽 리스트 명령이 성공하면 healthy
#      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      test: [ "CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Kafka UI
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8082:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=voiceprint
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
      - KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL=PLAINTEXT
    depends_on:
      kafka:
        condition: service_healthy # 브로커 헬스체크 성공 후 UI 띄움
    networks:
      - voiceprint_net
    restart: unless-stopped

  # 2. Discovery Service (Eureka)
  discovery-service:
    build: ./services/discovery-service
    ports:
      - "8762:8761"
    environment: # Todo: 제거해!
      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=false
      - EUREKA_CLIENT_FETCH_REGISTRY=false
      - SERVER_PORT=8761
    networks:
      - voiceprint_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s # Modified from 30s

  # 3. Config Service
  config-service:
    build: ./services/config-service
    ports:
      - "8889:8888"
    environment:
      - SPRING_PROFILES_ACTIVE=native
      - SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS=file:/config-repo #Todo: git으로 관리하는 것도 고려해보자 언젠가
    volumes:
      - ./config-repo:/config-repo
    networks:
      - voiceprint_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s # Modified from 30s

  # 4. Gateway Service
  gateway-service:
    build: ./services/gateway-service
    ports:
      - "8001:8000"
    depends_on:
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
    environment:
      - SPRING_CONFIG_IMPORT=configserver:http://config-service:8888
    volumes:
      - ./logs/gateway:/app/logs
    networks:
      - voiceprint_net

  # 5. Backend Service (MSA)
  backend-msa:
    build:
      context: .
      dockerfile: ./services/backend-msa/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./services/backend-msa/.env
    environment:  # Todo: 제거하기.
      MYSQL_HOST: mysql_vp
      MYSQL_PORT: 3306
      MYSQL_DATABASE: voiceprint_db
      MYSQL_USER: voiceprint_user
      MYSQL_PASSWORD: thisisneverthat
    volumes:
      - ./logs/backend:/app/logs
    networks:
      - voiceprint_net

  # 6. Notification Service
  notification-service:
    build:
      context: .
      dockerfile: ./services/notification-service/Dockerfile
    depends_on:
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment: # Todo : 제거하기.
      - SPRING_CONFIG_IMPORT=configserver:http://config-service:8888
      - SPRING_JWT_SECRET=vmfhaltmskdlstkfkdgodyrolroqkfwkalskdjqwkjdnkasjlqsssa
    volumes:
      - ./logs/notification:/app/logs
    networks:
      - voiceprint_net

  # MySQL Service (from docker-compose.yml)
  mysql:
    container_name: mysql_vp
    build:
      context: ./mysql
      dockerfile: Dockerfile
    ports:
      - "3307:3306" #로컬에서 3306 이미 사용중.
    env_file:
      - ./mysql/.env
    volumes:
      - ./mysql/init:/docker-entrypoint-initdb.d
      - mysql-data:/var/lib/mysql
    networks: [voiceprint_net] # Changed network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping"] # mysql이 healthy 한 지 판단
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  mysql_notification:
    container_name: mysql_notification
    build:
      context: ./mysql_notification
      dockerfile: Dockerfile
    ports:
      - "3308:3306"
    env_file:
      - ./mysql_notification/.env
    volumes:
      - ./mysql_notification/init:/docker-entrypoint-initdb.d
      - mysql_notification-data:/var/lib/mysql
    networks: [voiceprint_net]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Redis Service (from docker-compose.yml)
  redis:
    container_name: redis
    image: redis:8
    ports:
      - "6379:6379"
    env_file:
      - ./redis/.env
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    command:
      - /bin/sh
      - -c
      - redis-server /usr/local/etc/redis/redis.conf --requirepass "$${REDIS_PASSWORD:?REDIS_PASSWORD variable is not set}"
    networks: [voiceprint_net] # Changed network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" ping"]
      interval: 5s
      retries: 10
    restart: unless-stopped

  # Prometheus
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro   # 스크랩 타입 정의
      - prom_data:/prometheus   # TSDB 보존.
    ports:
      - "9090:9090"
    networks:
      - voiceprint_net

  # Loki
  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    command: -config.file=/etc/loki/local-config.yml
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yml:ro  # 저장소/인덱스 설정 포함
      - ./monitoring/loki/data:/loki                                     # 로컬 디스크 저장 (개발)
    ports:
      - "3100:3100"  # Grafana → Loki 연결 및 로컬 디버그용
    networks: [ voiceprint_net ]
    restart: unless-stopped

  # Promtail
  promtail:
    image: grafana/promtail:2.9.0
    container_name: promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - ./logs:/var/log  # 호스트의 앱 로그를 모아두는 디렉터리. 각 서비스가 여기에 파일로그를 쓰도록 마운트.
    depends_on:
      - loki
    networks: [ voiceprint_net ]
    restart: unless-stopped

  # Grafana
  grafana:
    image: grafana/grafana
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin      # 초기 관리자 계정.
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana     # 데이터(대시보드/사용자) 영구화
      # 프로비저닝: 컨테이너 시작 시 자동으로 DataSource/Dashboard를 불러옴.
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - voiceprint_net



volumes:
  kafka_data:
  mysql-data:
    name: mysql-data
  mysql_notification-data:
    name: mysql_notification-data
  prom_data:
  grafana_data:

networks:
  voiceprint_net:
    driver: bridge
    # external : true