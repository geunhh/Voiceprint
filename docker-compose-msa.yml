version: '3.8'

services:
  # 1. Kafka (Zookeeper-less KRaft mode)
  kafka:
    image: bitnami/kafka:latest
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_BROKER_ID=1
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CLUSTER_ID: "a9d5b1b2-b1b2-4b1b-8b1b-d5b1b2a9d5b1"
    networks:
      - voiceprint_net

  # 2. Discovery Service (Eureka)
  discovery-service:
    build: ./services/discovery-service
    ports:
      - "8761:8761"
    networks:
      - voiceprint_net

  # 3. Config Service
  config-service:
    build: ./services/config-service
    ports:
      - "8888:8888"
    environment:
      - CONFIG_REPO_PATH=/config-repo
    volumes:
      - ./config-repo:/config-repo
    networks:
      - voiceprint_net

  # 4. Gateway Service
  gateway-service:
    build: ./services/gateway-service
    ports:
      - "8000:8000"
    depends_on:
      - discovery-service
    networks:
      - voiceprint_net

  # 5. Backend Service (MSA)
  backend-msa:
    build: ./services/backend-msa
    ports:
      - "8080:8080"
    depends_on:
      - discovery-service
      - kafka
    networks:
      - voiceprint_net

  # 6. Notification Service
  notification-service:
    build: ./services/notification-service
    depends_on:
      - discovery-service
      - kafka
    networks:
      - voiceprint_net

networks:
  voiceprint_net:
    driver: bridge
