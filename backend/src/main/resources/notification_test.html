<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SSE 테스트 클라이언트</title>
</head>
<body>
<h1>SSE 테스트 페이지</h1>
<p><strong>유저 ID: 1 (임시)</strong>로 SSE 구독 중</p>
<ul id="log"></ul>

<script>
    const log = document.getElementById("log");

    // 단일 사용자 테스트용 엔드포인트
    const eventSource = new EventSource("http://localhost:8080/api/sse/subscribe/test");

    // 기본 메시지
    eventSource.onmessage = (event) => {
        const li = document.createElement("li");
        li.textContent = `[기본] ${event.data}`;
        log.appendChild(li);
    };

    // 알림 타입별 처리 예시
    eventSource.addEventListener("reminder", (event) => {
        const li = document.createElement("li");
        li.textContent = `[리마인더] ${event.data}`;
        log.appendChild(li);
    });

    eventSource.addEventListener("new_comment", (event) => {
        const li = document.createElement("li");
        li.textContent = `[댓글 알림] ${event.data}`;
        log.appendChild(li);
    });

    // 에러 핸들링
    eventSource.onerror = (err) => {
        console.error("SSE 연결 오류", err);
        const li = document.createElement("li");
        li.textContent = `[오류] 연결 종료`;
        log.appendChild(li);
        eventSource.close();
    };
</script>
</body>
</html>
