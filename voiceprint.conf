server {
  listen 80;
  server_name k12b106.p.ssafy.io;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name k12b106.p.ssafy.io;

  # SSL 인증서 설정
  ssl_certificate /etc/letsencrypt/live/k12b106.p.ssafy.io/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/k12b106.p.ssafy.io/privkey.pem;

  # HTTPS 설정
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # 프론트앤드 정적 파일 요청 처리
  location / {
    proxy_pass http://frontend:80;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # API 요청 프록시
  location /api/ {
  proxy_pass         http://backend:8080;
  proxy_http_version 1.1;
  proxy_set_header   Upgrade           $http_upgrade;
  proxy_set_header   Connection        "upgrade";
  proxy_set_header   Host              $host;
  proxy_set_header   X-Real-IP         $remote_addr;
  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header   X-Forwarded-Proto $scheme;

  # ── 1) Jenkins Project Webhook 프록시 블록 추가 ──
  location /project/ {
    proxy_pass       http://jenkins:8080/project/;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ↓ 웹훅 Secret Token 헤더를 Jenkins 로 전달
    proxy_set_header X-Gitlab-Token     $http_x_gitlab_token;
  }
  
  # WebSocket 타임아웃·버퍼링 설정 (선택)
  proxy_read_timeout  3600s;
  proxy_send_timeout  3600s;
  proxy_buffering     off;
  }
}