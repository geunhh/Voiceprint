image: gradle:8.14.0-jdk21-jammy

variables:
  SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
  GIT_DEPTH: "0"
  SONAR_HOST_URL: "$SONAR_HOST_URL"
  SONAR_TOKEN: "$SONAR_TOKEN"

stages:
  - analysis

analysis:
  stage: analysis
  tags:
    - sonarqube
  cache:
    policy: pull-push
    key: "sonar-cache-$CI_COMMIT_REF_SLUG"
    paths:
      - "${SONAR_USER_HOME}/cache"
  script:
    - cd backend
    - chmod +x ./gradlew
    - ./gradlew clean build sonarqube -Dsonar.host.url=$SONAR_HOST_URL -Dsonar.token=$SONAR_TOKEN -Dsonar.qualitygate.wait=true
  rules:
    - if: '$CI_COMMIT_REF_NAME == "develop"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop"'
      when: always
    - when: never
