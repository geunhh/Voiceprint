variables:
  SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
  GIT_DEPTH: "0"
  SONAR_HOST_URL: "$SONAR_HOST_URL"
  SONAR_TOKEN_BACKEND: "$SONAR_TOKEN"
  SONAR_TOKEN_FRONTEND: "$SONAR_TOKEN_FRONTEND"

stages:
  - backend-analysis
  - frontend-analysis

backend-analysis:
  stage: backend-analysis
  tags:
    - sonarqube
  image: gradle:8.14.0-jdk21-jammy
  cache:
    policy: pull-push
    key: "sonar-cache-$CI_JOB_NAME"
    paths:
      - "${SONAR_USER_HOME}/cache"
  script:
    - |
      cd backend
      chmod +x ./gradlew
      ./gradlew clean build sonarqube -x test \
        -Dsonar.projectKey=s12-final_S12P31B106_f09ff99e-cb2b-42be-9648-691716b25443  \
        -Dsonar.host.url=$SONAR_HOST_URL \
        -Dsonar.token=$SONAR_TOKEN_BACKEND \
        -Dsonar.qualitygate.wait=true 
  rules:
    - if: '$CI_COMMIT_REF_NAME == "develop"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop"'
      when: always
    - when: never

frontend-analysis:
  stage: frontend-analysis
  tags: 
    - sonarqube
  image: sonarsource/sonar-scanner-cli:latest
  cache:
    policy: pull-push 
    key: "sonar-cache-$CI_JOB_NAME"
    paths: 
      - "${SONAR_USER_HOME}/cache"
  before_script:
    - cd frontend
    - npm ci
    - npm run build 
  script:
    - |
      sonar-scanner \
        -Dsonar.projectKey=voiceprint-frontend \
        -Dsonar.sources=./src \
        -Dsonar.exclusions="**/*.test.js,**/*.spec.js" \
        -Dsonar.javascript.lcov.reportPaths=./coverage/lcov.info \ 
        -Dsonar.host.url=$SONAR_HOST_URL \
        -Dsonar.token=$SONAR_TOKEN_FRONTEND \
        -Dsonar.qualitygate.wait=true
  artifacts:
    paths:
      - frontend/coverage/lcov.info
  rules:
    - if: '$CI_COMMIT_REF_NAME == "develop"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop"'
      when: always
    - when: never