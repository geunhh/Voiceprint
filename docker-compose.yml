services:
  frontend:
    container_name: frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: voiceprint-frontend:latest
    ports:
      - "80:80"
    env_file:
      - .env
    networks:
      - voiceprint-network

  backend:
    container_name: backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: voiceprint-backend:latest
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - voiceprint-network
    
  mysql:
    container_name: mysql
    build:
      context: ./mysql
      dockerfile: Dockerfile
    ports:
      - "3306:3306"
    volumes:
      - ./mysql-data:/var/lib/mysql
    networks:
      - voiceprint-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping"] # mysql이 healthy 한 지 판단
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    container_name: redis
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10
  
volumes:
  mysql-data:
    name: mysql-data

networks:
  voiceprint-network:                
    name: voiceprint-network         
    driver: bridge