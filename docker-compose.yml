services:
  # FE
  frontend:
    container_name: frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8001}
    # Ports moved to overrides
    env_file:
      - ./frontend/.env
    environment:
      - TZ=${TZ}
    volumes:
      - /etc/localtime:/etc/localtime:ro
    networks: [ voiceprint_net ]

  # 1. Kafka (KRaft mode)
  kafka:
    image: confluentinc/cp-kafka:${KAFKA_IMAGE_TAG}
    container_name: kafka
    # Ports moved to overrides
    environment:
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: "1"
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      CLUSTER_ID: FpsANus9RYqj6SpEpTSjSA
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - voiceprint_net
    healthcheck:
      test: [ "CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Kafka UI
  kafka-ui:
    image: provectuslabs/kafka-ui:${KAFKA_UI_IMAGE_TAG}
    container_name: kafka-ui
    # Ports moved to overrides
    environment:
      - KAFKA_CLUSTERS_0_NAME=${PROJECT_NAME}
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
      - KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL=PLAINTEXT
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - voiceprint_net

  # 2. Discovery Service (Eureka)
  discovery-service:
    build: ./services/discovery-service
    # Ports moved to overrides
    environment:
      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=false
      - EUREKA_CLIENT_FETCH_REGISTRY=false
      - SERVER_PORT=8761
    networks:
      - voiceprint_net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8761/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # 3. Config Service
  config-service:
    build: ./services/config-service
    # Ports moved to overrides
    environment:
      - SPRING_PROFILES_ACTIVE=native
      - SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS=file:/config-repo
    volumes:
      - ./config-repo:/config-repo
    networks:
      - voiceprint_net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8888/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # 4. Gateway Service
  gateway-service:
    build: ./services/gateway-service
    # Ports moved to overrides
    depends_on:
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
    environment:
      - SPRING_CONFIG_IMPORT=configserver:http://config-service:8888
    volumes:
      - ./logs/gateway:/app/logs
    networks:
      - voiceprint_net

  # 5. Backend Service (MSA)
  backend-msa:
    build:
      context: .
      dockerfile: ./services/backend-msa/Dockerfile
    # Ports moved to overrides
    depends_on:
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./services/backend-msa/.env
    environment:
      MYSQL_HOST: mysql_vp
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_JWT_SECRET: ${SPRING_JWT_SECRET}
      LOADTEST_TOKEN_SECRET: ${LOADTEST_TOKEN_SECRET}
    volumes:
      - ./logs/backend:/app/logs
    networks:
      - voiceprint_net

  # 6. Notification Service
  notification-service:
    build:
      context: .
      dockerfile: ./services/notification-service/Dockerfile
    # Ports moved to overrides
    depends_on:
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      redis-pubsub:
        condition: service_healthy
    environment:
      - SPRING_CONFIG_IMPORT=configserver:http://config-service:8888
      - SPRING_JWT_SECRET=${SPRING_JWT_SECRET}
      - LOADTEST_TOKEN_SECRET=${LOADTEST_TOKEN_SECRET}
    volumes:
      - ./logs/notification:/app/logs
    networks:
      - voiceprint_net

  # MySQL Service
  mysql:
    container_name: mysql_vp
    build:
      context: ./mysql
      dockerfile: Dockerfile
    # Ports moved to overrides
    # env_file removed
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ./mysql/init:/docker-entrypoint-initdb.d
      - mysql-data:/var/lib/mysql
    networks: [ voiceprint_net ]
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 10

  mysql_notification:
    container_name: mysql_notification
    build:
      context: ./mysql_notification
      dockerfile: Dockerfile
    # Ports moved to overrides
    # env_file removed
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_NOTIFICATION_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_NOTIFICATION_DATABASE}
      MYSQL_USER: ${MYSQL_NOTIFICATION_USER}
      MYSQL_PASSWORD: ${MYSQL_NOTIFICATION_PASSWORD}
    volumes:
      - ./mysql_notification/init:/docker-entrypoint-initdb.d
      - mysql_notification-data:/var/lib/mysql
    networks: [ voiceprint_net ]
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 10

  # Redis Service
  redis:
    container_name: redis
    image: redis:${REDIS_IMAGE_TAG}
    # Ports moved to overrides
    # env_file removed
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    command:
      - /bin/sh
      - -c
      - redis-server /usr/local/etc/redis/redis.conf --requirepass "${REDIS_PASSWORD}"
    networks: [ voiceprint_net ]
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD}\" ping" ]
      interval: 5s
      retries: 10

  redis-pubsub:
    container_name: redis-pubsub
    image: redis:${REDIS_IMAGE_TAG}
    # Ports moved to overrides
    # env_file removed
    volumes:
      - ./redis-pubsub.conf:/usr/local/etc/redis/redis.conf:ro
    command:
      - /bin/sh
      - -c
      - redis-server /usr/local/etc/redis/redis.conf --requirepass "${REDIS_PASSWORD}"
    networks: [ voiceprint_net ]
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD}\" -p 6379 ping" ]
      interval: 5s
      retries: 10

  # Monitoring (Prometheus, Grafana, Loki, etc.) could be kept here or moved to a monitoring compose file.
  # Keeping them here for simplicity but removing ports from base.

  prometheus:
    image: prom/prometheus:${PROMETHEUS_IMAGE_TAG}
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data:/prometheus
    networks:
      - voiceprint_net

  loki:
    image: grafana/loki:${LOKI_IMAGE_TAG}
    container_name: loki
    command: -config.file=/etc/loki/local-config.yml
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yml:ro
      - ./monitoring/loki/data:/loki
    networks: [ voiceprint_net ]

  promtail:
    image: grafana/promtail:${PROMTAIL_IMAGE_TAG}
    container_name: promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - ./logs:/var/log
    depends_on:
      - loki
    networks: [ voiceprint_net ]

  grafana:
    image: grafana/grafana:${GRAFANA_IMAGE_TAG}
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    networks:
      - voiceprint_net

volumes:
  kafka_data:
  mysql-data:
    name: mysql-data
  mysql_notification-data:
    name: mysql_notification-data
  prom_data:
  grafana_data:


networks:
  voiceprint_net:
    driver: bridge
