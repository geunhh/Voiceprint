auth_enabled: false

server:
  http_listen_port: 3100  # Grafana → http://loki:3100

ingester:
  lifecycler:
    ring:
      kvstore:
        store: inmemory            # 단일 노드: 인메모리 링 저장소
      replication_factor: 1        # 복제 1 (싱글 노드)
  wal:
    enabled: true
    dir: /loki/wal

schema_config:
  configs:
    - from: 2020-10-24
      store: boltdb-shipper        # 인덱스 저장 방식 (Boltdb 기반)
      object_store: filesystem     # 실제 로그 청크 저장 위치 (로컬 FS or S3)
      schema: v11
      index:
        prefix: index_             # 인덱스 파일 이름 접두사
        period: 24h

storage_config:
  boltdb_shipper:
    active_index_directory: /loki/index   # 인덱스 활성 디렉터리 (볼륨으로 보존 권장)
    cache_location: /loki/cache           # 로컬 캐시 (볼륨 권장)
    cache_ttl: 24h
    shared_store: filesystem
  filesystem:
    directory: /loki/chunks               # 청크 저장 디렉터리 (볼륨으로 보존 권장)

compactor:
  working_directory: /loki/compactor      # 컴팩터 작업 디렉터리
  shared_store: filesystem
  retention_enabled: true                 # 보존기간 집행을 compactor로 활성화 (boltdb-shipper 필수)

limits_config:
  enforce_metric_name: false              # 로그 라벨에 메트릭 규칙 강제 안 함(로그용으로 OK)
  reject_old_samples: true                # 너무 오래된(이하의 max_age 초과) 로그 ingest 거부
  reject_old_samples_max_age: 168h        # 7일보다 오래된 타임스탬프는 수집 거부
  retention_period: 168h                  # 실제 저장 데이터 보존기간(7일). compactor가 삭제 집행.

chunk_store_config:
  max_look_back_period: 0s                # 쿼리 최대 look-back 제한 없음

# table_manager는 boltdb-shipper에선 retention에 영향 없음. 아래는 비활성 유지.
table_manager:
  retention_deletes_enabled: false
  retention_period: 0s